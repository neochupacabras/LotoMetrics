name: Importar resultados de loteria

on:
  schedule:
    # Horários em UTC (Brasil = UTC-3, então 23h UTC = 20h BRT)
    # Lotofácil: segunda, quarta e sábado às 20h BRT
    - cron: "30 23 * * 1,3,6"
    # Mega-Sena: terça, quinta e sábado às 20h BRT
    - cron: "30 23 * * 2,4,6"
    # Segurança: rodar de madrugada todo dia para pegar concursos perdidos
    - cron: "0 6 * * *"

  workflow_dispatch:
    inputs:
      modo:
        description: "Modo de importação"
        required: true
        default: "incremental"
        type: choice
        options:
          - incremental
          - unico
      loteria:
        description: "Loteria"
        required: true
        default: "todas"
        type: choice
        options:
          - todas
          - lotofacil
          - megasena
      numero:
        description: "Número do concurso (apenas para modo unico)"
        required: false
        type: string

jobs:
  importar:
    name: Importar resultados
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências Python
        run: pip install psycopg2-binary requests

      - name: Forçar IPv4 para o host do Supabase
        # O GitHub Actions pode tentar IPv6, mas o Supabase só aceita IPv4.
        # Passamos o host via variável de ambiente (não interpolado no código Python)
        # para evitar que o shell trate '$PGHOST' como literal.
        env:
          PGHOST: ${{ secrets.PGHOST }}
        run: |
          IPV4=$(python3 - <<'PYEOF'
          import socket, os, sys
          host = os.environ.get("PGHOST", "").strip()
          if not host:
              print("ERRO: secret PGHOST está vazio", file=sys.stderr)
              sys.exit(1)
          results = socket.getaddrinfo(host, None, socket.AF_INET)
          print(results[0][4][0])
          PYEOF
          )
          echo "Host: $PGHOST  →  IPv4: $IPV4"
          echo "$IPV4 $PGHOST" | sudo tee -a /etc/hosts
          echo "PGHOST_RESOLVED=$PGHOST" >> $GITHUB_ENV

      - name: Executar importador (modo agendado)
        if: github.event_name == 'schedule'
        env:
          PGHOST: ${{ secrets.PGHOST }}
          PGPORT: ${{ secrets.PGPORT }}
          PGDATABASE: ${{ secrets.PGDATABASE }}
          PGUSER: ${{ secrets.PGUSER }}
          PGPASSWORD: ${{ secrets.PGPASSWORD }}
          PGSSLMODE: require
        run: python importador.py --modo incremental --loteria todas

      - name: Executar importador (modo manual)
        if: github.event_name == 'workflow_dispatch'
        env:
          PGHOST: ${{ secrets.PGHOST }}
          PGPORT: ${{ secrets.PGPORT }}
          PGDATABASE: ${{ secrets.PGDATABASE }}
          PGUSER: ${{ secrets.PGUSER }}
          PGPASSWORD: ${{ secrets.PGPASSWORD }}
          PGSSLMODE: require
        run: |
          if [ "${{ inputs.modo }}" = "unico" ] && [ -n "${{ inputs.numero }}" ]; then
            python importador.py \
              --modo unico \
              --loteria ${{ inputs.loteria }} \
              --numero ${{ inputs.numero }}
          else
            python importador.py \
              --modo ${{ inputs.modo }} \
              --loteria ${{ inputs.loteria }}
          fi
