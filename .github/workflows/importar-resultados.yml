name: Importar resultados de loteria

on:
  schedule:
    # Lotofácil: segunda, quarta e sábado às 20h30 BRT
    - cron: "30 23 * * 1,3,6"
    # Mega-Sena: terça, quinta e sábado às 20h BRT
    - cron: "30 23 * * 2,4,6"
    # Quina: segunda a sábado às 20h BRT (23h UTC)
    - cron: "0 23 * * 1-6"
    # Lotomania: segunda a sábado às 20h BRT
    - cron: "0 23 * * 1-6"
    # Segurança: todo dia às 6h UTC
    - cron: "0 6 * * *"

  workflow_dispatch:
    inputs:
      modo:
        description: "Modo de importação"
        required: true
        default: "incremental"
        type: choice
        options:
          - incremental
          - unico
      loteria:
        description: "Loteria"
        required: true
        default: "todas"
        type: choice
        options:
          - todas
          - lotofacil
          - megasena
          - quina
          - lotomania
      numero:
        description: "Número do concurso (apenas para modo unico)"
        required: false
        type: string

jobs:
  importar:
    name: Importar resultados
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      PGHOST: ${{ secrets.PGHOST }}
      PGPORT: ${{ secrets.PGPORT }}
      PGDATABASE: ${{ secrets.PGDATABASE }}
      PGUSER: ${{ secrets.PGUSER }}
      PGPASSWORD: ${{ secrets.PGPASSWORD }}
      PGSSLMODE: require

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências Python
        run: pip install psycopg2-binary requests

      - name: Executar importador (modo agendado)
        if: github.event_name == 'schedule'
        run: python importador.py --modo incremental --loteria todas

      - name: Executar importador (modo manual)
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ inputs.modo }}" = "unico" ] && [ -n "${{ inputs.numero }}" ]; then
            python importador.py \
              --modo unico \
              --loteria ${{ inputs.loteria }} \
              --numero ${{ inputs.numero }}
          else
            python importador.py \
              --modo ${{ inputs.modo }} \
              --loteria ${{ inputs.loteria }}
          fi
